# OPD pathwise-only: round_robin — one teacher per batch, cycling.
#
# Cheapest multi-teacher mode: each micro-batch uses only 1 teacher forward.
# In expectation over training, all M teachers get equal coverage.
#
# 3 teachers × 3 datasets: Text(OCR), PickScore, GenEval.
# Evaluation on all three test_sets.

# Environment Configuration
launcher: "accelerate"
config_file: config/deepspeed/deepspeed_zero2.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "bf16"

# Data Configuration
data:
  dataset_dir: "dataset/ocr"
  preprocessing_batch_size: 32
  dataloader_num_workers: 16
  force_reprocess: false
  cache_dir: "~/.cache/flow_factory/datasets"
  max_dataset_size: null
  sampler_type: "auto"

# Model Configuration
model:
  finetune_type: 'lora'
  lora_rank: 32
  lora_alpha: 64
  target_modules: "default"
  model_name_or_path: "stabilityai/stable-diffusion-3.5-medium"
  model_type: "sd3-5"
  resume_path: null
  resume_type: null

log:
  run_name: "sd3-5_lora_opd_pathwise_only_round_robin"
  project: "Flow-Factory-OPD-Experiments"
  logging_backend: "wandb"
  save_dir: "saves/"
  save_freq: 20
  save_model_only: true

# Training Configuration
train:
  trainer_type: 'opd'

  teacher_paths:
    - "jieliu/SD3.5M-FlowGRPO-Text"
    - "jieliu/SD3.5M-FlowGRPO-PickScore"
    - "jieliu/SD3.5M-FlowGRPO-GenEval"
  teacher_param_device: 'cuda'
  teacher_aggregation: 'round_robin'   # One teacher per batch, cycling across (epoch, inner_epoch, batch_idx)
  pathwise_coef: 1.0
  reinforce_coef: 0.0
  normalize_d_k: false
  reinforce_future_reduction: "sum"
  reinforce_group_center: false

  kl_beta: 0.0
  kl_type: 'x-based'

  resolution: 512
  num_inference_steps: 10
  guidance_scale: 4.5

  per_device_batch_size: 8
  group_size: 1
  unique_sample_num_per_epoch: 64
  gradient_step_per_epoch: 1
  gradient_accumulation_steps: auto
  num_inner_epochs: 1

  learning_rate: 3.0e-4
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  ema_decay: 0.99
  ema_update_interval: 4
  ema_device: "cuda"

  enable_gradient_checkpointing: false
  max_epochs: 200
  seed: 42

# Scheduler Configuration
scheduler:
  dynamics_type: "Flow-SDE"
  noise_level: 0.8
  num_sde_steps: null
  sde_steps: null
  seed: 42

# Evaluation settings
eval:
  resolution: 512
  per_device_batch_size: 32
  guidance_scale: 4.5
  num_inference_steps: 40
  eval_freq: 10
  seed: 42
  test_sets:
    - name: ocr
      dataset_dir: dataset/ocr
      split: test
      eval_reward_names: [ocr, pick_score]
    - name: pickscore
      dataset_dir: dataset/pickscore
      split: test
      eval_reward_names: [pick_score]
    - name: geneval
      dataset_dir: dataset/geneval
      split: test
      eval_reward_names: [geneval, pick_score]

rewards:
  - name: "ocr"
    reward_model: "ocr"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false

eval_rewards:
  - name: "ocr"
    reward_model: "ocr"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
  - name: "geneval"
    reward_model: "geneval"
    batch_size: 64
    device: "cuda"
    dtype: float32
    async_reward: false
