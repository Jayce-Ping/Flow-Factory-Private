# Reproduce DiffusionOPD Algorithm 1 — via dedicated diffusion-opd trainer.
#
# Uses the standalone DiffusionOPDTrainer which implements Algorithm 1 directly:
#   - Per-task dataloaders: each task has its own DataLoader from task.dataset_dir
#   - Interleaved rollout + loss: N student forwards per task (not 2N)
#   - ODE Euler rollout (no-grad) → per-step MSE against task-specific teacher
#   - L_total = Σ_m L_m → single backward → optimizer.step()
#
# Key difference from via_opd_route_by_source.yaml:
#   - Separate dataloaders per task (not a merged dataset with __source__ routing)
#   - Interleaved rollout (student forward serves both rollout and loss)
#   - No SDE/REINFORCE infrastructure overhead
#
# Both implementations should produce equivalent results given the same
# data ordering and random seeds.

# Environment Configuration
launcher: "accelerate"
config_file: config/deepspeed/deepspeed_zero2.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "bf16"

# Data Configuration
# ALL datasets declared here — preprocessed ONCE by BaseTrainer.
data:
  dataset_dir: "dataset/ocr"        # Fallback for eval/test
  dataset_dirs:                      # Multi-source (each → __source__ = basename)
    - "dataset/ocr"
    - "dataset/pickscore"
    - "dataset/geneval"
  preprocessing_batch_size: 32
  dataloader_num_workers: 16
  force_reprocess: false
  cache_dir: "~/.cache/flow_factory/datasets"
  max_dataset_size: null
  sampler_type: "auto"

# Model Configuration
model:
  finetune_type: 'lora'
  lora_rank: 32
  lora_alpha: 64
  target_modules: "default"
  model_name_or_path: "stabilityai/stable-diffusion-3.5-medium"
  model_type: "sd3-5"
  resume_path: null
  resume_type: null

log:
  run_name: "reproduce_diffusion_opd_via_dedicated_trainer"
  project: "Flow-Factory-OPD-Experiments"
  logging_backend: "wandb"
  save_dir: "saves/"
  save_freq: 20
  save_model_only: true

# Training Configuration — DiffusionOPD Algorithm 1 (dedicated trainer)
train:
  trainer_type: 'diffusion-opd'

  # Teacher-source mapping (unified format, same as OPD trainer)
  # Each teacher only distills on samples from its assigned sources.
  # Sources match basenames of data.dataset_dirs.
  teachers:
    - path: "jieliu/SD3.5M-FlowGRPO-Text"
      sources: [ocr]
    - path: "jieliu/SD3.5M-FlowGRPO-PickScore"
      sources: [pickscore]
    - path: "jieliu/SD3.5M-FlowGRPO-GenEval"
      sources: [geneval]

  teacher_param_device: 'cuda'

  # Loss: L_m = pathwise_coef * Σ_j (1/2)||μ_S - μ_T||²
  pathwise_coef: 1.0

  # No KL anchor (pure teacher distillation)
  kl_beta: 0.0
  kl_type: 'x-based'

  # ODE rollout settings
  resolution: 512
  num_inference_steps: 10
  guidance_scale: 4.5

  # Batch geometry
  per_device_batch_size: 8
  group_size: 1
  unique_sample_num_per_epoch: 576   # 24 samples/source/GPU × 3 sources × 8 GPUs; each teacher gets 3 batches of 8
  gradient_step_per_epoch: 1
  gradient_accumulation_steps: auto
  num_inner_epochs: 1

  # Optimization
  learning_rate: 3.0e-4
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  # EMA
  ema_decay: 0.99
  ema_update_interval: 4
  ema_device: "cuda"

  enable_gradient_checkpointing: false
  max_epochs: 200
  seed: 42

# Scheduler — ODE (required for diffusion-opd trainer)
scheduler:
  dynamics_type: "ODE"
  noise_level: 0
  num_sde_steps: null
  sde_steps: null
  seed: 42

# Evaluation on all three datasets
eval:
  resolution: 512
  per_device_batch_size: 32
  guidance_scale: 4.5
  num_inference_steps: 40
  eval_freq: 10
  seed: 42
  test_sets:
    - name: ocr
      dataset_dir: dataset/ocr
      split: test
      eval_reward_names: [ocr, pick_score]
    - name: pickscore
      dataset_dir: dataset/pickscore
      split: test
      eval_reward_names: [pick_score]
    - name: geneval
      dataset_dir: dataset/geneval
      split: test
      eval_reward_names: [geneval, pick_score]

rewards:
  - name: "ocr"
    reward_model: "ocr"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
    applicable_sources: [ocr]
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
    applicable_sources: [pickscore]
  - name: "geneval"
    reward_model: "geneval"
    batch_size: 64
    device: "cuda"
    dtype: float32
    async_reward: false
    applicable_sources: [geneval]

eval_rewards:
  - name: "ocr"
    reward_model: "ocr"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
  - name: "geneval"
    reward_model: "geneval"
    batch_size: 64
    device: "cuda"
    dtype: float32
    async_reward: false
