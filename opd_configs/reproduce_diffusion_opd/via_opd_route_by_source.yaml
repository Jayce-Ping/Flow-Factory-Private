# Reproduce DiffusionOPD Algorithm 1 — via OPD trainer + route_by_source + ODE.
#
# Uses the existing OPD trainer with:
#   - dynamics_type: ODE (deterministic Euler rollout, σ_t=1 → plain MSE)
#   - teacher_route_by_source: true (each teacher only sees its source's samples)
#   - data.dataset_dirs: multi-source (ocr, pickscore, geneval)
#   - teachers: per-source routing config
#   - reinforce_coef: 0 (pure pathwise, no REINFORCE since ODE has no log_prob)
#
# This is functionally equivalent to DiffusionOPD Algorithm 1:
#   for each round:
#     L_total = 0
#     for m in {ocr, pickscore, geneval}:
#       samples from C^(m) matched to teacher m only
#       L_m = Σ_j ||μ_S(x_{t_j}) - μ_T^(m)(x_{t_j})||²
#       L_total += L_m
#     backward(L_total); optimizer.step()
#
# The OPD trainer handles this via source-based sample routing within a
# single shared dataloader (dataset_dirs concatenated with __source__ tags).

# Environment Configuration
launcher: "accelerate"
config_file: config/deepspeed/deepspeed_zero2.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "bf16"

# Data Configuration — multi-source (each dir becomes a __source__ tag)
data:
  dataset_dir: "dataset/ocr"  # Fallback for eval/test
  dataset_dirs:
    - "dataset/ocr"           # __source__ = "ocr"
    - "dataset/pickscore"     # __source__ = "pickscore"
    - "dataset/geneval"       # __source__ = "geneval"
  preprocessing_batch_size: 32
  dataloader_num_workers: 16
  force_reprocess: false
  cache_dir: "~/.cache/flow_factory/datasets"
  max_dataset_size: null
  sampler_type: "auto"

# Model Configuration
model:
  finetune_type: 'lora'
  lora_rank: 32
  lora_alpha: 64
  target_modules: "default"
  model_name_or_path: "stabilityai/stable-diffusion-3.5-medium"
  model_type: "sd3-5"
  resume_path: null
  resume_type: null

log:
  run_name: "reproduce_diffusion_opd_via_route_by_source"
  project: "Flow-Factory-OPD-Experiments"
  logging_backend: "wandb"
  save_dir: "saves/"
  save_freq: 20
  save_model_only: true

# Training Configuration
train:
  trainer_type: 'opd'

  # Per-source teacher routing (DiffusionOPD Algorithm 1 equivalent)
  teachers:
    - path: "jieliu/SD3.5M-FlowGRPO-Text"
      sources: [ocr]               # Text teacher only distills on OCR prompts
    - path: "jieliu/SD3.5M-FlowGRPO-PickScore"
      sources: [pickscore]         # PickScore teacher only distills on PickScore prompts
    - path: "jieliu/SD3.5M-FlowGRPO-GenEval"
      sources: [geneval]           # GenEval teacher only distills on GenEval prompts

  teacher_route_by_source: true    # Strict per-source routing (Algorithm 1)
  teacher_param_device: 'cuda'
  teacher_aggregation: 'sum'       # Sum per-teacher losses → single backward

  # Pure pathwise MSE (no REINFORCE — ODE has no log_prob)
  pathwise_coef: 1.0
  reinforce_coef: 0.0
  normalize_d_k: false             # ODE: σ²=1 → plain MSE
  reinforce_future_reduction: "sum"
  reinforce_group_center: false

  kl_beta: 0.0
  kl_type: 'x-based'

  # ODE rollout
  resolution: 512
  num_inference_steps: 10
  guidance_scale: 4.5

  per_device_batch_size: 8
  group_size: 1
  unique_sample_num_per_epoch: 576   # 24 samples/source/GPU × 3 sources × 8 GPUs; round-robin gives 9 batches covering all sources
  gradient_step_per_epoch: 1
  gradient_accumulation_steps: auto
  num_inner_epochs: 1

  learning_rate: 3.0e-4
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  ema_decay: 0.99
  ema_update_interval: 4
  ema_device: "cuda"

  enable_gradient_checkpointing: false
  max_epochs: 200
  seed: 42

# Scheduler — ODE (deterministic, no stochastic SDE steps)
scheduler:
  dynamics_type: "ODE"
  noise_level: 0
  num_sde_steps: null
  sde_steps: null
  seed: 42

# Evaluation on all three datasets
eval:
  resolution: 512
  per_device_batch_size: 32
  guidance_scale: 4.5
  num_inference_steps: 40
  eval_freq: 10
  seed: 42
  test_sets:
    - name: ocr
      dataset_dir: dataset/ocr
      split: test
      eval_reward_names: [ocr, pick_score]
    - name: pickscore
      dataset_dir: dataset/pickscore
      split: test
      eval_reward_names: [pick_score]
    - name: geneval
      dataset_dir: dataset/geneval
      split: test
      eval_reward_names: [geneval, pick_score]

rewards:
  - name: "ocr"
    reward_model: "ocr"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
    applicable_sources: [ocr]
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
    applicable_sources: [pickscore]
  - name: "geneval"
    reward_model: "geneval"
    batch_size: 64
    device: "cuda"
    dtype: float32
    async_reward: false
    applicable_sources: [geneval]

eval_rewards:
  - name: "ocr"
    reward_model: "ocr"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
  - name: "geneval"
    reward_model: "geneval"
    batch_size: 64
    device: "cuda"
    dtype: float32
    async_reward: false
