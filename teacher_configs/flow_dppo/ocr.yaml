# Flow-DPPO OCR Teacher Config
# Based on flow_grpo/ocr.yaml with mask_type='kl_adv' for DPPO training.

# Environment Configuration
launcher: "accelerate"
config_file: config/deepspeed/deepspeed_zero2.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "bf16"

# Data Configuration
data:
  dataset_dir: "dataset/ocr"
  preprocessing_batch_size: 32
  dataloader_num_workers: 16
  force_reprocess: false
  cache_dir: "~/.cache/flow_factory/datasets"
  max_dataset_size: null
  sampler_type: "auto"

# Model Configuration
model:
  finetune_type: 'lora'
  lora_rank: 32
  lora_alpha: 64
  target_modules: "default"
  model_name_or_path: "stabilityai/stable-diffusion-3.5-medium"
  model_type: "sd3-5"
  resume_path: null
  resume_type: null

log:
  run_name: "dppo_ocr_teacher"
  project: "Flow-Factory-OPD-Experiments"
  logging_backend: "wandb"
  save_dir: "/apdcephfs_zwfy8/share_305110755/hunyuan/bowenping/checkpoints/MOF"
  save_freq: 20
  save_model_only: true

# Training Configuration
train:
  max_epochs: 3000
  trainer_type: 'grpo'
  advantage_aggregation: 'sum'

  # ---- DPPO (mask_type='kl_adv') ----
  mask_type: 'kl_adv'             # DPPO: KL-advantage masking
  kl_mask_threshold: 1.0e-5       # KL threshold for new-vs-old policy divergence
  add_kl_coefficient: true        # Scale KL by sigma (for x-based only)

  # ---- Clipping / KL ----
  clip_range: 1.0e-5              # PPO clip range (fallback, not primary in DPPO)
  adv_clip_range: 10.0            # Advantage clipping range
  kl_type: 'v-based'             # KL divergence in velocity space
  kl_beta: 0                      # No reference KL penalty
  ref_param_device: 'cuda'

  # ---- Sampling ----
  resolution: 512
  num_inference_steps: 10
  guidance_scale: 1.0

  # ---- Batch and sampling ----
  per_device_batch_size: 8
  group_size: 18
  global_std: true
  unique_sample_num_per_epoch: 64
  gradient_step_per_epoch: 2
  gradient_accumulation_steps: auto

  # ---- Optimization ----
  learning_rate: 3.0e-4
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  # ---- EMA ----
  ema_decay: 0.99
  ema_update_interval: 4
  ema_device: "cuda"

  # ---- Misc ----
  enable_gradient_checkpointing: false
  seed: 42

# Scheduler Configuration
scheduler:
  dynamics_type: "CPS"
  noise_level: 0.8
  num_sde_steps: 3
  sde_steps: [0, 1, 2, 3, 4]
  seed: 42

# Evaluation settings
eval:
  resolution: 512
  per_device_batch_size: 32
  guidance_scale: 1.0
  num_inference_steps: 40
  eval_freq: 20
  seed: 42

# Reward Model Configuration
rewards:
  - name: "ocr"
    reward_model: "ocr"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false

eval_rewards:
  - name: "ocr"
    reward_model: "ocr"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
