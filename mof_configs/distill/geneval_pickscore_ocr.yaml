# MoF Distillation: distill 3-teacher weighted mixture → single student LoRA.
#
# Loads MoF checkpoint (saves/mof.pt) containing learned per-timestep mixing
# weights (K=3, T=10, S=3), then distills the weighted velocity combination
# into a single student LoRA via pathwise MSE loss.
#
# Data: GenEval + PickScore + OCR (round-robin interleaving, same as MoF training).
# Target: v_target = Σ_k λ_k(t, source) * v_teacher_k

# Environment Configuration
launcher: "accelerate"
config_file: config/accelerate_configs/multi_gpu.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "bf16"

# Data Configuration — multi-source (same 3 prompt sets as MoF training)
data:
  dataset_dir: "dataset/ocr"
  dataset_dirs:
    - "dataset/geneval"
    - "dataset/pickscore"
    - "dataset/ocr"
  preprocessing_batch_size: 32
  dataloader_num_workers: 16
  force_reprocess: false
  cache_dir: "~/.cache/flow_factory/datasets"
  max_dataset_size: null
  sampler_type: "auto"

# Model Configuration (student LoRA)
model:
  finetune_type: 'lora'
  lora_rank: 32
  lora_alpha: 64
  target_modules: "default"
  model_name_or_path: "stabilityai/stable-diffusion-3.5-medium"
  model_type: "sd3-5"
  resume_path: null
  resume_type: null

log:
  run_name: "mof_distill_sd3-5_geneval_pickscore_ocr_lut"
  project: "Flow-Factory-OPD-Experiments"
  logging_backend: "wandb"
  save_dir: "saves/"
  save_freq: 10
  save_model_only: false

# Training Configuration
train:
  trainer_type: 'mof-distill'

  # ---- Teacher configuration (same order as MoF training!) ----
  teachers:
    - name: "teacher-geneval"
      path: "~/checkpoints/dppo_geneval_teacher/checkpoints/checkpoint-600"
      sources: [geneval]
      reward_name: "geneval"
    - name: "teacher-pickscore"
      path: "~/checkpoints/dppo_pickscore_teacher/checkpoints/checkpoint-1500"
      sources: [pickscore]
      reward_name: "pick_score"
    - name: "teacher-ocr"
      path: "~/checkpoints/dppo_ocr_teacher/checkpoints/checkpoint-220"
      sources: [ocr]
      reward_name: "ocr"

  teacher_param_device: 'cuda'

  # ---- MoF checkpoint (source of mixing weights) ----
  mof_checkpoint: "saves/mof.pt"
  mof_module_type: "lut"                     # Discrete LUT mode (K=3, T=10, S=3)
  mof_temperature: 1.0
  mof_use_ema: false

  # ---- Distillation loss ----
  normalize_d_k: false                        # Pure MSE (set true for time-reweighted SDE)

  # ---- Optimization ----
  learning_rate: 3.0e-4
  per_device_batch_size: 8
  group_size: 1
  num_batches_per_epoch: 96 # 32 * 3 = 96
  num_inner_epochs: 1
  gradient_step_per_epoch: 1 # 1 gradient step per epoch
  gradient_accumulation_steps: auto
  max_grad_norm: 1.0
  adam_weight_decay: 1.0e-4
  adam_epsilon: 1.0e-8
  ddp_find_unused_parameters: false
  max_epochs: 500
  seed: 42

  # ---- Generation settings (for monitoring inference) ----
  resolution: 512
  guidance_scale: 1.0
  num_inference_steps: 10
  enable_gradient_checkpointing: false

# Scheduler Configuration
scheduler:
  dynamics_type: "ODE"                        # ODE for distillation (no stochastic noise)
  noise_level: 0.0
  seed: 42

# Evaluation settings
eval:
  resolution: 1024
  per_device_batch_size: 16
  guidance_scale: 1.0
  num_inference_steps: 40
  eval_freq: 10
  seed: 42
  test_sets:
    - name: geneval
      dataset_dir: dataset/geneval
      split: test
      eval_reward_names: [geneval, pick_score]
    - name: pickscore
      dataset_dir: dataset/pickscore
      split: test
      eval_reward_names: [pick_score]
    - name: ocr
      dataset_dir: dataset/ocr
      split: test
      eval_reward_names: [ocr, pick_score]

# Training rewards (for periodic monitoring during distillation)
rewards:
  - name: "geneval"
    reward_model: "geneval"
    batch_size: 64
    device: "cuda"
    dtype: float32
    async_reward: false
    applicable_sources: [geneval]
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
    applicable_sources: [geneval, pickscore, ocr]
  - name: "ocr"
    reward_model: "ocr"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
    applicable_sources: [ocr]

# Evaluation rewards
eval_rewards:
  - name: "geneval"
    reward_model: "geneval"
    batch_size: 64
    device: "cuda"
    dtype: float32
    async_reward: false
    applicable_sources: [geneval]
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
  - name: "ocr"
    reward_model: "ocr"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
    applicable_sources: [ocr]
