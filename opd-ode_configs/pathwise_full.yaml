# OPD-ODE ablation baseline: full BPTT through all Euler steps (Algorithm 2 / Eq. 13).
# Differentiable ODE rollout with pathwise_coef=1.0, bptt_steps=null, solver_checkpointing=false.
# Full BPTT retains O(N) peak autograd memory (retain_graph across steps); use
# solver_checkpointing.yaml or tbptt_steps_3.yaml if OOM.
# Closest ODE counterpart to SDE `opd_configs/pathwise_reinforce.yaml` (pure pathwise; no REINFORCE).
#
#   grad L = sum_j d D_j / d theta,
#   D_j = (dt_j^2 / 2) * mean(||v_theta - v_phi||^2)
#
# Companion ablations in this directory:
#   - tbptt_steps_3.yaml       : truncate autograd graph every 3 Euler steps
#   - solver_checkpointing.yaml : full BPTT + torch.utils.checkpoint per step (memory)
#
# Required prerequisites (see `train.teacher_paths` below):
#   - One or more LoRA checkpoints from `BaseAdapter.save_checkpoint()` with the
#     same rank/alpha as the student.
#
# Evaluation: covers three test_sets (ocr / pickscore / geneval) — see eval.test_sets below.

# Environment Configuration
launcher: "accelerate"
config_file: config/deepspeed/deepspeed_zero2.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "bf16"

# Data Configuration
data:
  dataset_dir: "dataset/ocr"
  preprocessing_batch_size: 8
  dataloader_num_workers: 16
  force_reprocess: false
  cache_dir: "~/.cache/flow_factory/datasets"
  max_dataset_size: 1024
  sampler_type: "auto"

# Model Configuration
model:
  finetune_type: 'lora'
  lora_rank: 32
  lora_alpha: 64
  target_modules: "default"
  model_name_or_path: "stabilityai/stable-diffusion-3.5-medium"
  model_type: "sd3-5"
  resume_path: null
  resume_type: null

log:
  run_name: "sd3-5_lora_opd_ode_pathwise_full"
  project: "Flow-Factory-OPD"
  logging_backend: "wandb"
  save_dir: "saves/"
  save_freq: 20
  save_model_only: true

# Training Configuration
train:
  trainer_type: 'opd-ode'

  teacher_paths:
    - "jieliu/SD3.5M-FlowGRPO-Text"
    # - "/path/to/local/lora_dir"
  teacher_param_device: 'cuda'
  teacher_aggregation: 'round_robin'

  pathwise_coef: 1.0
  solver_checkpointing: false
  bptt_steps: null                       # Full BPTT (paper-exact Algorithm 2).

  kl_beta: 0.0
  kl_type: 'x-based'

  resolution: 512
  # ODE BPTT keeps N transformer forwards in-graph; 6 steps fits ~24 GB at bs=4 (SDE ablations use 10).
  num_inference_steps: 6
  guidance_scale: 4.5

  per_device_batch_size: 4
  group_size: 1
  unique_sample_num_per_epoch: 64
  gradient_step_per_epoch: 1
  gradient_accumulation_steps: auto
  num_inner_epochs: 1

  learning_rate: 3.0e-4
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  ema_decay: 0.99
  ema_update_interval: 4
  ema_device: "cuda"

  enable_gradient_checkpointing: false
  seed: 42

# Scheduler Configuration
scheduler:
  dynamics_type: "ODE"       # Required for OPD-ODE.
  noise_level: 0             # Required: deterministic Euler rollout.
  num_sde_steps: null
  sde_steps: null
  seed: 42

eval:
  resolution: 512
  per_device_batch_size: 32
  guidance_scale: 4.5
  num_inference_steps: 40
  eval_freq: 10
  seed: 42
  test_sets:
    - name: ocr
      dataset_dir: dataset/ocr
      split: test
      eval_reward_names: [ocr, pick_score]
    - name: pickscore
      dataset_dir: dataset/pickscore
      split: test
      eval_reward_names: [pick_score]
    - name: geneval
      dataset_dir: dataset/geneval
      split: test
      eval_reward_names: [geneval, pick_score]

# Auxiliary reward logging only (not used by OPD-ODE optimize()).
rewards:
  - name: "ocr"
    reward_model: "ocr"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false

eval_rewards:
  - name: "ocr"
    reward_model: "ocr"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
    async_reward: false
  - name: "geneval"
    reward_model: "geneval"
    batch_size: 64
    device: "cuda"
    # NOTE: GenEval reward 内部强制 fp32 计算（autocast disabled + model.float()），
    # 此处 dtype 仅作配置占位，实际不被消费；显式写 float32 避免"yaml 控制 GenEval 精度"的误会。
    dtype: float32
    async_reward: false
