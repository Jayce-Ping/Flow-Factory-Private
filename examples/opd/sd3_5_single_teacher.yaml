# Single-teacher OPD on SD-3.5 medium.
# Mirrors the OPD pipeline of https://github.com/CostaliyA/Flow-OPD (single
# `kl_ref_lora_path` config), but plugged into Flow-Factory's framework so
# the same OPDTrainer works on every model registered in `models/registry.py`.
#
# Required: a frozen LoRA teacher checkpoint (typically a strong specialist
# fine-tuned via GRPO / SFT on a single reward axis, e.g. OCR, GenEval, etc.).

# Environment Configuration
launcher: "accelerate"
config_file: config/deepspeed/deepspeed_zero2.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "bf16"

# Data Configuration
data:
  dataset_dir: "dataset/pickscore"
  preprocessing_batch_size: 8
  dataloader_num_workers: 16
  force_reprocess: false
  cache_dir: "~/.cache/flow_factory/datasets"
  max_dataset_size: 1024

# Model Configuration
# OPD requires `finetune_type: lora` so that teacher LoRAs can be attached as
# named PEFT adapters next to the student "default" adapter.
model:
  finetune_type: 'lora'
  lora_rank: 32
  lora_alpha: 64
  target_modules: "default"
  model_name_or_path: "stabilityai/stable-diffusion-3.5-medium"
  model_type: "sd3-5"
  # Cold-start init: typically the model-merge or SFT result described in the
  # Flow-OPD paper (§"Cold Start Initialization"). Set null to start from base.
  resume_path: null
  resume_type: null

log:
  run_name: null
  project: "Flow-Factory"
  logging_backend: "wandb"
  save_dir: "saves/"
  save_freq: 20
  save_model_only: true

# Training Configuration
train:
  trainer_type: 'opd'

  # ---- OPD-specific ----
  # One frozen LoRA teacher. Path must point to a directory containing either
  # a PEFT-saved adapter (adapter_config.json + adapter_model.safetensors) or
  # a raw LoRA safetensors export.
  teacher_loras:
    pickscore_teacher: "/path/to/pickscore_teacher_lora"
  # teacher_dataset_map omitted -> single-teacher mode (every batch uses the
  # only entry in `teacher_loras`).
  kl_scale: 1.0

  # PPO-style ratio clipping & advantage clipping (inherited from GRPO).
  clip_range: 1.0e-4
  adv_clip_range: 5.0

  # Optional MAR (Manifold Anchor Regularization): KL between student and the
  # *base* model (LoRA disabled), reused from GRPOTrainer's `enable_kl_loss`
  # path. Set kl_beta > 0 to enable.
  kl_type: 'x-based'
  kl_beta: 0
  ref_param_device: 'cuda'

  # Sampling settings
  resolution: 512
  num_inference_steps: 10
  guidance_scale: 4.5

  # Batch and sampling
  per_device_batch_size: 8
  group_size: 24
  global_std: true
  unique_sample_num_per_epoch: 48
  gradient_step_per_epoch: 2

  # Optimization
  learning_rate: 3.0e-4
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  # EMA
  ema_decay: 0.99
  ema_update_interval: 4
  ema_device: "cuda"

  enable_gradient_checkpointing: false
  seed: 42

# Scheduler Configuration
scheduler:
  dynamics_type: "Flow-SDE"
  noise_level: 0.8
  num_sde_steps: 2
  sde_steps: [1, 2, 3, 4, 5]
  seed: 42

# Evaluation settings
eval:
  resolution: 512
  per_device_batch_size: 8
  guidance_scale: 4.5
  num_inference_steps: 40
  eval_freq: 20
  seed: 42

# Reward Model Configuration
# OPD does NOT use task rewards for training; leave empty for a pure
# distillation run, or configure `eval_rewards` only for monitoring.
rewards: []

eval_rewards:
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 32
    device: "cuda"
    dtype: bfloat16
